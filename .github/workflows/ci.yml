name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]
    container: astral/uv:python${{ matrix.python-version }}-bookworm-slim

    steps:
      - uses: actions/checkout@v4

      # If uv.lock exists later, switch to: uv sync --locked
      - name: Install deps
        run: uv pip install -e ".[dev]"

      - name: Black (check)
        run: uv run black --check .

      - name: isort (check)
        run: uv run isort --check-only .

      - name: Mypy
        run: uv run mypy src/kinexon_handball_api

      - name: Pytest (if tests exist)
        run: |
          if [ -d test ] || [ -d tests ]; then
            uv run pytest
          else
            echo "No tests directory found, skipping pytest."
          fi

  build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    container: astral/uv:python3.13-bookworm-slim

    steps:
      - uses: actions/checkout@v4

      - name: Build package
        run: uv build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kinexon-dist
          path: dist/
